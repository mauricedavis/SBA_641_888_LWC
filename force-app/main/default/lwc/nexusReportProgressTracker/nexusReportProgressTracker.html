<template>
    <div class="slds-m-top_medium">
        <p class="slds-m-bottom_x-small">
            Status: <strong>{status}</strong>
            <template if:true={isComplete}>
                &nbsp;<lightning-icon icon-name="utility:success" size="x-small"></lightning-icon>
            </template>
        </p>
        <lightning-progress-bar value={percentComplete} size="large"></lightning-progress-bar>
        <p class="slds-text-color_weak slds-m-top_x-small slds-text-body_small">
            {batchesProcessed} of {totalBatches} batches processed
        </p>
        <p if:true={extendedStatus} class="slds-text-color_weak slds-text-body_small">{extendedStatus}</p>
    </div>
</template>
